<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTask - Premium Navigation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="app-container">
        <header class="app-header">
            <div class="header-top">
                <div>
                    <h1 class="app-title">ProTask.</h1>
                    <p class="app-subtitle">Elevate your productivity today.</p>
                </div>
                <div class="date-container" id="date-display">
                    <!-- Date inserted by JS -->
                </div>
            </div>

            <div class="stats-container">
                <div class="stat-card">
                    <span class="stat-value" id="total-tasks">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="completed-tasks">0</span>
                    <span class="stat-label">Completed</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="pending-tasks">0</span>
                    <span class="stat-label">Pending</span>
                </div>
                <!-- Progress ring -->
                <div class="progress-container">
                    <svg class="progress-ring" width="60" height="60">
                        <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.1)" stroke-width="4" fill="transparent" r="26" cx="30" cy="30" />
                        <circle class="progress-ring__circle" stroke="url(#gradient)" stroke-width="4" fill="transparent" r="26" cx="30" cy="30" />
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#4F46E5" />
                                <stop offset="100%" stop-color="#7C3AED" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <div class="progress-text" id="progress-text">0%</div>
                </div>
            </div>
        </header>

        <section class="input-section">
            <form id="todo-form">
                <div class="input-group">
                    <input type="text" id="todo-input" placeholder="What needs to be done?" autocomplete="off" required>
                    <button type="submit" class="btn-primary" aria-label="Add task">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </div>
            </form>
        </section>

        <section class="filters-section">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
            <button class="clear-btn" id="clear-completed">Clear Completed</button>
        </section>

        <section class="list-section">
            <ul id="todo-list" class="todo-list">
                <!-- Todo items inserted by JS -->
            </ul>
            <div class="empty-state" id="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                <p>No tasks yet. Add a task to get started.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
